<header class="hdr">
  <div class="container hdr-inner">
    <a routerLink="/" class="brand" (click)="closeMenu()">
      <span class="brand-dot"></span>
      <span class="brand-name">Pro Calendar</span>
    </a>

    <nav class="nav" [class.open]="menuOpen()">
      <a routerLink="/"     routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">{{ 'nav.home' | t }}</a>
      <a routerLink="/help" routerLinkActive="active" (click)="closeMenu()">{{ 'nav.help' | t }}</a>
      <a routerLink="/terms" routerLinkActive="active" (click)="closeMenu()">{{ 'nav.terms' | t }}</a>
      <a routerLink="/privacy" routerLinkActive="active" (click)="closeMenu()">{{ 'nav.privacy' | t }}</a>
    </nav>

    <div class="hdr-actions">
      <!-- Theme toggle -->
      <button class="icon-btn" (click)="toggleTheme()" [attr.aria-label]="isDark() ? 'Light mode' : 'Dark mode'" title="Light / Dark">
        @if (isDark()) {
          <!-- sol -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
        } @else {
          <!-- luna -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>

      <!-- Language picker -->
      <div class="lang">
        <button class="lang-btn" (click)="toggleLang()" [attr.aria-expanded]="langOpen()">
          {{ currentFlag() }}
          <span>{{ currentCode() }}</span>
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
        </button>
        @if (langOpen()) {
          <div class="lang-menu">
            @for (l of i18n.available; track l.code) {
              <button (click)="pickLang(l.code)" [class.active]="isActiveLang(l.code)">
                <span>{{ l.flag }}</span> {{ l.label }}
              </button>
            }
          </div>
        }
      </div>

      <a [href]="githubUrl" target="_blank" rel="noopener" class="btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.08 3.29 9.39 7.86 10.92.58.1.79-.25.79-.55v-1.92c-3.2.7-3.88-1.54-3.88-1.54-.52-1.34-1.28-1.7-1.28-1.7-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.55-.29-5.24-1.27-5.24-5.66 0-1.25.45-2.27 1.18-3.07-.12-.29-.51-1.46.11-3.04 0 0 .97-.31 3.18 1.17a11.05 11.05 0 0 1 5.79 0c2.21-1.48 3.18-1.17 3.18-1.17.62 1.58.23 2.75.11 3.04.74.8 1.18 1.82 1.18 3.07 0 4.4-2.7 5.36-5.26 5.65.41.35.78 1.05.78 2.11v3.13c0 .3.21.66.79.55C20.21 21.38 23.5 17.08 23.5 12 23.5 5.65 18.35.5 12 .5z"/></svg>
        {{ 'nav.github' | t }}
      </a>

      <button class="hamburger" (click)="toggleMenu()" aria-label="Menú">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>
